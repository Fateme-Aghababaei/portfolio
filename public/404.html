<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script type="text/javascript">
      // GitHub Pages serves this file for any unknown path (e.g. /projects/2 on
      // a refresh). It re-encodes the path into a query string and redirects to
      // index.html, which decodes it back via the matching snippet below.
      // See https://github.com/rafgraph/spa-github-pages

      // 0 = deployed at a custom domain or username.github.io (root).
      // 1 = deployed as a project page at username.github.io/repo-name — also
      //     set `base: '/repo-name/'` in vite.config.ts if you change this.
      var pathSegmentsToKeep = 0;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
